name: Daily Product Scrape & Deploy

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build & Run Scraper
        run: |
          dotnet new tool-manifest --force
          dotnet tool install Microsoft.Playwright.CLI

          # 2. Build the Server
          dotnet build Brochure.Scraper.Server/Brochure.Scraper.Server.csproj

          # 3. Install Browsers and Dependencies
          # The '--with-deps' is critical for the Linux runner to have the right libraries
          dotnet tool run playwright install --with-deps

          # 4. Run the Scraper
          dotnet run --project Brochure.Scraper.Server/Brochure.Scraper.Server.csproj

      - name: Commit Updated JSON
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add brochure.scraper.client/public/products.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Data Update" && git push)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build Frontend
        run: |
          cd brochure.scraper.client
          npm install
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./brochure.scraper.client/dist