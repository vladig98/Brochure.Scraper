name: Daily Product Scrape & Deploy

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build & Run Scraper
        run: |
          dotnet build brochure.scraper.server/brochure.scraper.server.csproj
          pwsh brochure.scraper.server/bin/Debug/net8.0/playwright.ps1 install --with-deps
          dotnet run --project brochure.scraper.server/brochure.scraper.server.csproj

      - name: Commit Updated JSON
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add brochure.scraper.client/public/products.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Data Update" && git push)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd brochure.scraper.client
          npm install
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./brochure.scraper.client/dist