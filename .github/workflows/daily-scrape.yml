name: Daily Product Scrape & Deploy

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build & Run Scraper
        run: |
          dotnet build Brochure.Scraper.Server/Brochure.Scraper.Server.csproj
          dotnet run --project Brochure.Scraper.Server/Brochure.Scraper.Server.csproj -- --scrape

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build Frontend
        run: |
          cd brochure.scraper.client
          npm install
          npm run build -- --emptyOutDir || npx vite build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./brochure.scraper.client/dist