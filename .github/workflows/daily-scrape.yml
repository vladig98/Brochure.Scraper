name: Daily Product Scrape

on:
  schedule:
    - cron: '0 6 * * *' # Runs at 6:00 AM UTC daily
  workflow_dispatch: # Allows you to click a button in GitHub to start it manually

permissions:
  contents: write # Crucial: Allows the bot to push the JSON back to your repo

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Playwright Browsers
        # We need the browsers for the scraper to actually work
        run: |
          dotnet build brochure.scraper.server/brochure.scraper.server.csproj
          pwsh brochure.scraper.server/bin/Debug/net8.0/playwright.ps1 install --with-deps

      - name: Run Scraper
        # This starts the backend, writes the file, and exits naturally
        run: dotnet run --project brochure.scraper.server/brochure.scraper.server.csproj

      - name: Commit and Push changes
        # Only pushes if the products.json actually changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add brochure.scraper.client/public/products.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Data Refresh: $(date)" && git push)

      - name: Deploy to GitHub Pages
        # This triggers the actual hosting update
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./brochure.scraper.client/dist 
          # Note: Ensure you run 'npm run build' before this step if deploying the frontend here